<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weekly Rota Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Private aviation client services</p>
        <h1>Weekly rota planner</h1>
      </div>
      <div class="header-actions" aria-label="Export actions">
        <button id="exportJson" type="button">Export JSON</button>
        <button id="exportCsv" type="button">Export CSV</button>
      </div>
    </header>

    <main class="app-main">
      <section class="planner-panel controls-panel" aria-labelledby="plannerTitle">
        <div class="section-heading">
          <div>
            <h2 id="plannerTitle">US Eastern weekly grid</h2>
            <p>Displayed in US Eastern time across the full week. Business coverage remains 08:00-22:00 ET.</p>
          </div>
          <div class="heading-tools">
            <div class="week-nav" aria-label="Week navigation">
              <button id="previousWeek" type="button">Previous</button>
              <span id="weekRange" class="week-range"></span>
              <button id="currentWeek" type="button">Current</button>
              <button id="nextWeek" type="button">Next</button>
            </div>
            <div class="legend" aria-label="Legend">
              <span><i class="chip rs"></i>RS</span>
              <span><i class="chip dp"></i>DP</span>
              <span><i class="chip as"></i>AS</span>
              <span><i class="status-dot"></i>Warning</span>
            </div>
            <div class="panel-tools" aria-label="Roster data tools">
              <button class="icon-button" type="button" data-modal-target="fairnessModal" aria-label="Open fairness" title="Fairness">&#x2256;</button>
              <button class="icon-button" type="button" data-modal-target="blockEditorModal" aria-label="Open block editor" title="Block editor">&#x270E;</button>
              <button class="icon-button" type="button" data-modal-target="weekendModal" aria-label="Open weekend and on-call" title="Weekend / on-call">&#x260E;</button>
              <button class="icon-button" type="button" data-modal-target="configModal" aria-label="Open editable config" title="Editable config">&#x2699;</button>
              <button class="icon-button" type="button" data-modal-target="dpDebugModal" aria-label="Open DP fixed hours debug" title="DP fixed hours debug">i</button>
            </div>
          </div>
        </div>
      </section>

      <div class="layout">
        <section class="planner-panel grid-panel" aria-labelledby="plannerTitle">
          <section id="weekendSummary" class="weekend-summary" aria-expanded="false"
              aria-live="polite"></section>
          <div id="grid" class="grid-shell" aria-live="polite"></div>
        </section>

        <aside class="side-panel" aria-label="Rota tools and validation">
          <section class="card data-panel" data-panel="validation">
            <button
              class="data-panel__header"
              type="button"
              aria-controls="panel-validation-body"
            >
              <span class="data-panel__title">Validation</span>
              <span class="data-panel__summary">Warnings</span>
              <span class="data-panel__chevron" aria-hidden="true">v</span>
            </button>
            <div class="data-panel__body" id="panel-validation-body">
              <div id="warnings" class="warnings"></div>
            </div>
          </section>
        </aside>
      </div>
    </main>

    <dialog id="fairnessModal" class="panel-modal">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2>Fairness</h2>
          <button class="icon-button modal-close" type="button" data-modal-close aria-label="Close fairness">&times;</button>
        </div>
        <section class="card data-panel fairness-panel" data-panel="fairness" data-default-collapsed="false">
          <button
            class="data-panel__header"
            type="button"
            aria-expanded="true"
            aria-controls="panel-fairness-body"
          >
            <span class="data-panel__title">Fairness</span>
            <span class="data-panel__summary">Weekly balance</span>
            <span class="data-panel__chevron" aria-hidden="true">v</span>
          </button>
          <div class="data-panel__body" id="panel-fairness-body">
            <div id="fairness" class="fairness-table"></div>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="blockEditorModal" class="panel-modal">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2>Block editor</h2>
          <button class="icon-button modal-close" type="button" data-modal-close aria-label="Close block editor">&times;</button>
        </div>
        <section class="card data-panel" data-panel="block-editor" data-default-collapsed="false">
          <button
            class="data-panel__header"
            type="button"
            aria-controls="panel-block-editor-body"
          >
            <span class="data-panel__title">Block editor</span>
            <span class="data-panel__summary">Assignments</span>
            <span class="data-panel__chevron" aria-hidden="true">v</span>
          </button>
          <div class="data-panel__body" id="panel-block-editor-body">
            <form id="assignmentForm" class="editor-form">
              <label>
                Day
                <select id="editDay"></select>
              </label>
              <div class="inline-fields">
                <label>
                  Start
                  <input id="editStart" type="time" step="900" value="08:00" />
                </label>
                <label>
                  End
                  <input id="editEnd" type="time" step="900" value="10:00" />
                </label>
              </div>
              <fieldset>
                <legend>People</legend>
                <div id="peopleChecks" class="check-grid"></div>
              </fieldset>
              <div class="form-actions">
                <button id="saveBlock" type="submit">Save block</button>
                <button id="clearBlock" type="button">Clear matching block</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="weekendModal" class="panel-modal">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2>Weekend / on-call</h2>
          <button class="icon-button modal-close" type="button" data-modal-close aria-label="Close weekend and on-call">&times;</button>
        </div>
        <section class="card data-panel" data-panel="weekend" data-default-collapsed="false">
          <button
            class="data-panel__header"
            type="button"
            aria-controls="panel-weekend-body"
          >
            <span class="data-panel__title">Weekend / on-call</span>
            <span class="data-panel__summary">Owner</span>
            <span class="data-panel__chevron" aria-hidden="true">v</span>
          </button>
          <div class="data-panel__body" id="panel-weekend-body">
            <div id="weekendPanel"></div>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="configModal" class="panel-modal panel-modal--wide">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2>Editable config</h2>
          <button class="icon-button modal-close" type="button" data-modal-close aria-label="Close editable config">&times;</button>
        </div>
        <section class="card config-card data-panel" data-panel="config" data-default-collapsed="false">
          <button
            class="data-panel__header"
            type="button"
            aria-controls="panel-config-body"
          >
            <span class="data-panel__title">Editable config</span>
            <span class="data-panel__summary">JSON</span>
            <span class="data-panel__chevron" aria-hidden="true">v</span>
          </button>
          <div class="data-panel__body" id="panel-config-body">
            <div class="config-heading">
              <button id="applyConfig" type="button">Apply JSON</button>
            </div>
            <textarea id="configEditor" spellcheck="false" aria-label="Editable rota JSON configuration"></textarea>
            <p id="configStatus" class="config-status" role="status"></p>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="dpDebugModal" class="panel-modal panel-modal--wide">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2>DP fixed hours debug</h2>
          <button class="icon-button modal-close" type="button" data-modal-close aria-label="Close DP fixed hours debug">&times;</button>
        </div>
        <section class="card data-panel" data-panel="dp-debug" data-default-collapsed="false">
          <button
            class="data-panel__header"
            type="button"
            aria-controls="panel-dp-debug-body"
          >
            <span class="data-panel__title">DP fixed hours debug</span>
            <span class="data-panel__summary">Fixed hours</span>
            <span class="data-panel__chevron" aria-hidden="true">v</span>
          </button>
          <div class="data-panel__body" id="panel-dp-debug-body">
            <div id="dpDebug" class="dp-debug-table"></div>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="cellDialog">
      <form method="dialog" class="dialog-body">
        <h2 id="dialogTitle">Edit slot</h2>
        <p id="dialogMeta"></p>
        <div id="dialogChecks" class="check-grid"></div>
        <menu>
          <button value="cancel" type="button" id="dialogCancel">Cancel</button>
          <button value="save" type="submit" id="dialogSave">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
